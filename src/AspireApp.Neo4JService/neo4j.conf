# Neo4j Configuration for AspireAI - Optimized for Document Processing and RAG

# Network connector configuration
server.default_listen_address=0.0.0.0
server.default_advertised_address=localhost

# Bolt connector
server.bolt.enabled=true
server.bolt.listen_address=:7687
server.bolt.advertised_address=:7687

# HTTP Connector
server.http.enabled=true
server.http.listen_address=:7474
server.http.advertised_address=:7474

# HTTPS Connector (disabled for development)
server.https.enabled=false

# Memory settings optimized for document processing workloads
# Adjust these based on your available system memory
server.memory.heap.initial_size=512M
server.memory.heap.max_size=2G
server.memory.pagecache.size=1G

# Transaction settings for better performance with document ingestion
db.transaction.timeout=60s
db.transaction.concurrent.maximum=1000

# Query performance settings
dbms.cypher.forbid_exhaustive_shortestpath=false
dbms.cypher.forbid_shortestpath_common_nodes=false

# Security settings for APOC and GDS procedures
# gds.* is included so GDS procedures are unrestricted as required
dbms.security.procedures.unrestricted=apoc.*,gds.*
dbms.security.procedures.allowlist=apoc.*,gds.*

# NOTE: In Neo4j v5, APOC settings must be placed in a separate file named 'apoc.conf'.
# See the accompanying 'apoc.conf' file in this build context for APOC-specific settings.

# Logging configuration
server.logs.gc.enabled=false
# GC log options omitted to avoid JVM startup errors

# Vector index settings (for future embedding support)
# dbms.index.vector.enabled=true