# Neo4j Configuration for AspireAI - Optimized for Document Processing and RAG

# Network connector configuration
dbms.default_listen_address=0.0.0.0
dbms.default_advertised_address=localhost

# Bolt connector
dbms.connector.bolt.enabled=true
dbms.connector.bolt.listen_address=0.0.0.0:7687
dbms.connector.bolt.advertised_address=:7687

# HTTP Connector
dbms.connector.http.enabled=true
dbms.connector.http.listen_address=0.0.0.0:7474
dbms.connector.http.advertised_address=:7474

# HTTPS Connector (disabled for development)
dbms.connector.https.enabled=false

# Memory settings optimized for document processing workloads
# Adjust these based on your available system memory
dbms.memory.heap.initial_size=512M
dbms.memory.heap.max_size=2G
dbms.memory.pagecache.size=1G

# Transaction settings for better performance with document ingestion
dbms.transaction.timeout=60s
dbms.transaction.concurrent.maximum=1000

# Query performance settings
cypher.default_language_version=5
cypher.forbid_exhaustive_shortestpath=false
cypher.forbid_shortestpath_common_nodes=false

# Security settings for APOC and GDS procedures
dbms.security.procedures.unrestricted=apoc.*,gds.*
dbms.security.procedures.allowlist=apoc.*,gds.*

# APOC configuration for document processing
apoc.export.file.enabled=true
apoc.import.file.enabled=true
apoc.import.file.use_neo4j_config=true

# Logging configuration
dbms.logs.debug.level=INFO
dbms.logs.gc.enabled=true
dbms.logs.gc.options=-Xloggc:gc.log -XX:+UseGCLogFileRotation -XX:NumberOfGCLogFiles=3 -XX:GCLogFileSize=20m

# Store settings for better performance with graph operations
dbms.store.files_in_use_readonly_limit=200

# Index configuration for text search optimization
dbms.index.default_schema_provider=range-1.0
dbms.index.fulltext.default_analyzer=standard-no-stop-words

# Vector index settings (for future embedding support)
# dbms.index.vector.enabled=true